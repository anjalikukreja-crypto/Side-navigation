function QBadge({ label, chat, call, video, active, onClick }) {
  const [h, setH] = useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        display:"inline-flex",alignItems:"center",gap:6,
        padding:"3px 10px",borderRadius:100,border:"none",flexShrink:0,
        cursor:"pointer",whiteSpace:"nowrap",fontFamily:tk.font,
        background: active ? "#fff" : h ? "#ebebed" : "#f1f1f2",
        boxShadow: active ? "0 4px 19px rgba(0,0,0,0.05),0 -1px 9px rgba(0,0,0,0.03)" : "none",
        transition:"background 0.12s",
      }}>
      <span style={{ fontSize:12,fontWeight:700,color:active?"#11304f":"#2d2759",lineHeight:"18px" }}>{label}</span>
      <span style={{ display:"inline-flex",alignItems:"center",gap:4 }}>
        {[["chat",chat],["call",call],["video",video]].map(([type,count],i) => (
          <span key={type} style={{ display:"inline-flex",alignItems:"center",gap:3 }}>
            {i > 0 && <span style={{ width:1,height:8,background:active?"#d9d9de":"#c6c6c6" }}/>}
            <span style={{ display:"inline-flex",alignItems:"center",gap:2,color:active?"#11304f":"#76719e" }}>
              <SvgIcon name={{chat:"chat",call:"phone",video:"video"}[type]} size={9} color="currentColor"/>
              <span style={{ fontSize:10,fontWeight:700 }}>{count}</span>
            </span>
          </span>
        ))}
      </span>
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// COLLAPSED FLYOUT PANEL (shared by Option A & B)
// ─────────────────────────────────────────────────────────────
function CollapsedFlyoutPanel({ item, activeId, onSelect, triggerRef }) {
  const [pos, setPos] = useState(null);
  useEffect(() => {
    if (triggerRef?.current) {
      const r = triggerRef.current.getBoundingClientRect();
      setPos({ top: r.top, left: r.right + 8 });
    }
  }, []);

  function renderChildren(items, level = 0) {
    return items.map((child) => {
      const hasKids = child.children && child.children.length > 0;
      if (hasKids) {
        return (
          <div key={child.id}>
            <div style={{
              padding: `${level === 0 ? 10 : 8}px 14px 4px`,
              fontSize: 10, fontWeight: 600,
              color: "rgba(168,165,197,0.55)",
              textTransform: "uppercase", letterSpacing: "0.06em",
              fontFamily: tk.font,
            }}>
              {child.label}
            </div>
            {renderChildren(child.children, level + 1)}
          </div>
        );
      }
      const active = activeId === child.id;
      return (
        <button
          key={child.id}
          onClick={() => onSelect(child.id)}
          onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = "rgba(92,86,133,0.25)"; }}
          onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = "transparent"; }}
          style={{
            display:"flex",alignItems:"center",gap:9,
            padding:"7px 10px",
            width:"calc(100% - 8px)",margin:"1px 4px",
            background: active ? "rgba(92,86,133,0.55)" : "transparent",
            color: active ? "#fff" : "rgba(168,165,197,0.85)",
            border:"none",cursor:"pointer",borderRadius:8,
            fontFamily:tk.font,fontSize:13,fontWeight:active?700:400,
            textAlign:"left",transition:"background 0.1s",boxSizing:"border-box",
          }}
        >
          {child.icon && <SvgIcon name={child.icon} size={13} color="currentColor"/>}
          <span>{child.label}</span>
        </button>
      );
    });
  }

  if (!pos) return null;

  return (
    <div
      role="menu"
      aria-label={`${item.label} submenu`}
      style={{
        position:"fixed",top:pos.top,left:pos.left,zIndex:9999,
        background:"#14113a",borderRadius:14,minWidth:230,overflow:"hidden",
        boxShadow:"0 20px 60px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4)",
        border:"1px solid rgba(92,86,133,0.25)",
      }}
    >
      <div style={{ padding:"16px 16px 14px",fontSize:16,fontWeight:700,color:"#fff",fontFamily:tk.font,borderBottom:"1px solid rgba(168,165,197,0.18)" }}>
        {item.label}
      </div>
      <div style={{ padding:"8px 6px 12px" }}>
        {renderChildren(item.children)}
      </div>
    </div>
  );
}

  const [pageId, setPageId] = useState("ai-assistant");
  return (
    <div style={{ display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden" }}>
      <TopBar onLogoClick={onBack}/>
      <div style={{ display:"flex",flex:1,overflow:"hidden" }}>
        <SidebarA onItemClick={setPageId}/>
        <PageContent activeId={pageId}/>
      </div>
      <BackBar onBack={onBack} label="Option A — Feature-based" color="#a8a5c5"/>
    </div>
  );
}

function PreviewB({ onBack }) {
  const [pageId, setPageId] = useState("ai-assistant");
  return (
    <div style={{ display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden" }}>
      <TopBar onLogoClick={onBack}/>
      <div style={{ display:"flex",flex:1,overflow:"hidden" }}>
        <SidebarB onItemClick={setPageId}/>
        <PageContent activeId={pageId}/>
      </div>
      <BackBar onBack={onBack} label="Option B — Dept-based" color="#14b580"/>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("select"); // "select" | "A" | "B"
  if (view === "A") return <PreviewA onBack={() => setView("select")}/>;
  if (view === "B") return <PreviewB onBack={() => setView("select")}/>;
  return <SelectionPage onSelect={setView}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
